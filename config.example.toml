# ─── IM Channels ──────────────────────────────────────────────────────────────
# Each IM can be enabled/disabled independently. Currently only one IM can be
# active at a time.

[im.wechat]
enable = false
# Whitelist: only accept inbound messages from these user_ids. Empty = allow all.
allowed_users = []
typing_interval_ms = 5000

[im.dingtalk]
enable = false
client_id = ""        # appKey
client_secret = ""    # appSecret
# Whitelist: staff_id list. Empty = allow all.
allowed_users = []

[im.feishu]
enable = false
app_id = ""
app_secret = ""
verification_token = ""    # Event subscription verification token
encrypt_key = ""           # Event encryption key (optional, empty = no decryption)
webhook_bind = "0.0.0.0:9000"  # Feishu callback listener address
# Whitelist: open_id list. Empty = allow all.
allowed_users = []

[im.telegram]
enable = false
# Get token from @BotFather.
bot_token = ""
# Whitelist: Telegram user_id (numeric strings). Empty = allow all.
allowed_users = []
# Custom API base URL (for reverse proxy scenarios). Empty = https://api.telegram.org
api_base = ""

[agent]
backend = "claude-code"   # "claude-code" | "kimi" | "qoder" | "opencode" | "kiro" | "gemini" | "hermes" | "codex" | "acp"

# Claude Code backend (default). All fields are optional; empty values use library defaults.
[agent.claude-code]
# version = "0.16.2"        # npm version of @zed-industries/claude-code-acp
# command = "npx"           # Launcher command. Empty = npx
# args = []                 # Fully override launch args; version is ignored when non-empty
# extra_env = []            # [["FOO", "bar"]] format, injected into subprocess
# remove_env_extra = []     # Additional env vars to strip beyond defaults (CLAUDECODE, etc.)
# inject_settings_env = true  # Read ~/.claude/settings.json and inject its env into process

# Kimi Code CLI backend. Install: `pip install kimi-cli && kimi /login`
[agent.kimi]
# command = "kimi"          # Launcher. Empty = kimi (must be in PATH)
# args = []                 # Fully override launch args. Empty = ["acp"]
# extra_env = []
# remove_env = []

# Qoder CLI backend. Install qodercli and run `qodercli login`, or set personal_access_token.
[agent.qoder]
# command = "qodercli"      # Launcher. Empty = qodercli (must be in PATH)
# args = []                 # Empty = ["--acp"]
# extra_env = []
# remove_env = []
# personal_access_token = ""  # Get from https://qoder.com/account/integrations for non-interactive login

# OpenCode CLI backend (sst/opencode). Install: curl -fsSL https://opencode.ai/install | bash
# Auth: `opencode auth login`
[agent.opencode]
# command = "opencode"      # Launcher. Empty = opencode (must be in PATH)
# args = []                 # Empty = ["acp"]
# extra_env = []
# remove_env = []

# Kiro CLI backend (AWS Kiro). Install: curl -fsSL https://cli.kiro.dev/install | bash
# Auth: run `kiro-cli` interactively once to log in
[agent.kiro]
# command = "kiro-cli"      # Launcher; use absolute path ~/.local/bin/kiro-cli if daemon PATH is incomplete
# args = []                 # Empty = ["acp"] (+ "--agent <name>" if agent_name is set)
# agent_name = ""           # Use a specific Kiro agent configuration
# extra_env = []
# remove_env = []

# Gemini CLI backend (Google). Install: `npm install -g @google/gemini-cli` or `brew install gemini-cli`
# Auth: run `gemini` interactively once to complete Google login
[agent.gemini]
# command = "gemini"        # Launcher
# args = []                 # Empty = ["--acp"]
# extra_env = []
# remove_env = []

# Hermes Agent backend (Nous Research). Install: curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
# Auth: `hermes setup --portal` (OAuth) or `hermes auth add`
[agent.hermes]
# command = "hermes"        # Launcher
# args = []                 # Empty = ["acp"]
# extra_env = []
# remove_env = []

# OpenAI Codex CLI backend. Install: `npm i -g @openai/codex && codex login`
[agent.codex]
# command = "codex"               # Launcher. Empty = codex (must be in PATH)
# args = []                       # Empty = ["app-server"]
# extra_env = []
# sandbox_mode = "workspace-write"  # read-only | workspace-write | danger-full-access
# approval_mode = "never"          # never | on-request | on-failure | untrusted
# skip_git_repo_check = true
# model = ""                       # Empty = codex default (e.g. gpt-5-codex)

# Generic ACP backend: connect any ACP-speaking agent (custom ACP server, etc.)
[agent.acp]
# command = "your-acp-agent"
# args = []
# extra_env = []
# remove_env = []


[bridge]
# Working directory for the agent. Leave empty to auto-isolate each agent
# under ~/.agentline/agents/<agent>/ (recommended — never operates in $HOME).
# Set an explicit path to override, e.g. "~/projects/foo".
default_cwd = ""
state_dir = "~/.agentline"
# Seconds of inactivity before the agent session is automatically closed and recreated.
# 0 = disabled (session persists until /new or process exit). Default: 7200 (2 hours).
session_idle_timeout_secs = 7200
# UI language. "zh-CN" | "en". Default: Chinese.
locale = "zh-CN"
# Note: the global auto_approve_all option has been removed. Yolo mode is now
# per-session — enable with /yolo, automatically reverts to safe on /new or restart.


[web]
# Built-in dashboard: status / logs / WeChat QR login.
# Default: enable=true, bind to localhost. Change to 0.0.0.0:7681 for remote
# access (add your own firewall rules).
enable = true
bind = "127.0.0.1:7681"


# ─── Project List ─────────────────────────────────────────────────────────────
# Send /project in chat to select a project. New sessions will automatically
# receive project context and clone to the working directory. Multiple entries allowed.
#
# [[projects]]
# name    = "my-app"           # Short name, used in /project selection
# git_url = "https://github.com/org/my-app.git"
#
# [[projects]]
# name    = "backend"
# git_url = "git@github.com:org/backend.git"


[proxy]
# Proxy configuration (injected as env vars into all agent subprocesses).
# Empty string = inherit parent process proxy env vars, no modification.
# RFC-1918 LAN addresses (10.x / 172.16.x / 192.168.x, etc.) are always added
# to NO_PROXY regardless of this setting.

# HTTP proxy, e.g. "http://proxy.example.com:8080"
# Sets both HTTP_PROXY and http_proxy.
http = ""

# HTTPS proxy. Empty = falls back to http proxy, then to parent's HTTPS_PROXY.
https = ""

# Additional no_proxy entries (comma-separated).
# Merged with parent's NO_PROXY and built-in LAN ranges.
# Example: no_proxy = "myhost.internal,.corp.example.com,10.10.0.1"
no_proxy = ""

[log]
# Log level: error | warn | info | debug | trace (default: info).
# - Most operational details are at debug; info only logs message flow and key events.
# - Noisy third-party deps (hyper/reqwest/rustls, etc.) are pinned to warn even in debug mode.
# - Different levels have different colors; long/multiline logs are collapsed to one line with …
# - If RUST_LOG env var is set, it fully overrides this (e.g. RUST_LOG=agentline=debug,reqwest=info).
level = "info"
