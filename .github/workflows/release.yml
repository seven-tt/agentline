name: Release binaries

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            label: linux-x64
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            label: linux-arm64
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            label: mac-x64
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            label: mac-arm64
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            label: win-x64
            ext: .exe
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev

      # --- build ---
      - name: build
        run: cargo build --release --bin agentline --bin agentline-tray --target ${{ matrix.target }}

      # --- package: headless binary (all platforms) ---
      - name: package CLI binary
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/agentline${{ matrix.ext }}" \
             "dist/agentline-${VERSION}-${{ matrix.label }}${{ matrix.ext }}"

      # --- package: macOS .app bundle ---
      - name: package macOS .app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP_DIR="dist/AgentlineTray.app"
          mkdir -p "$APP_DIR/Contents/MacOS" "$APP_DIR/Contents/Resources"
          cp "target/${{ matrix.target }}/release/agentline-tray" "$APP_DIR/Contents/MacOS/agentline-tray"
          cp "target/${{ matrix.target }}/release/agentline"      "$APP_DIR/Contents/MacOS/agentline"
          cp "crates/tray/assets/AppIcon.icns"                    "$APP_DIR/Contents/Resources/AppIcon.icns"
          cat > "$APP_DIR/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>AgentlineTray</string>
              <key>CFBundleDisplayName</key>
              <string>Agentline</string>
              <key>CFBundleIdentifier</key>
              <string>com.agentline.tray</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleExecutable</key>
              <string>agentline-tray</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>LSUIElement</key>
              <true/>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>LSMinimumSystemVersion</key>
              <string>13.0</string>
          </dict>
          </plist>
          PLIST
          DMG_TMP="dmg-staging"
          mkdir -p "$DMG_TMP"
          mv "$APP_DIR" "$DMG_TMP/"
          ln -s /Applications "$DMG_TMP/Applications"
          DMG_NAME="agentline-tray-${VERSION}-${{ matrix.label }}.dmg"
          hdiutil create -volname "Agentline" -srcfolder "$DMG_TMP" -ov -format UDZO "dist/${DMG_NAME}"
          rm -rf "$DMG_TMP"

      # --- package: Linux .deb installer ---
      - name: package Linux .deb
        if: runner.os == 'Linux'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH="${{ matrix.label == 'linux-x64' && 'amd64' || 'arm64' }}"
          PKG="agentline-tray-${VERSION}-${{ matrix.label }}"
          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/usr/bin"
          mkdir -p "${PKG}/usr/share/applications"
          cp "target/${{ matrix.target }}/release/agentline"     "${PKG}/usr/bin/"
          cp "target/${{ matrix.target }}/release/agentline-tray" "${PKG}/usr/bin/"
          chmod +x "${PKG}/usr/bin/agentline" "${PKG}/usr/bin/agentline-tray"
          cat > "${PKG}/DEBIAN/control" <<CTRL
          Package: agentline
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: ${ARCH}
          Depends: libgtk-3-0, libxdo3
          Maintainer: seven-tt <seven-tt@users.noreply.github.com>
          Homepage: https://github.com/seven-tt/agentline
          Description: Connect any AI coding agent to any IM platform
           Agentline bridges AI coding agents (Claude Code, Gemini CLI, etc.)
           to IM platforms (WeChat, DingTalk, Feishu, Telegram).
          CTRL
          sed -i 's/^          //' "${PKG}/DEBIAN/control"
          cat > "${PKG}/usr/share/applications/agentline-tray.desktop" <<DESKTOP
          [Desktop Entry]
          Name=Agentline Tray
          Exec=agentline-tray
          Type=Application
          Categories=Utility;
          Comment=AI coding agent IM bridge
          DESKTOP
          sed -i 's/^          //' "${PKG}/usr/share/applications/agentline-tray.desktop"
          dpkg-deb --build "${PKG}"
          mv "${PKG}.deb" "dist/agentline-tray-${VERSION}-${{ matrix.label }}.deb"
          rm -rf "${PKG}"

      # --- package: Windows installer (.exe via Inno Setup) ---
      - name: package Windows installer
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BIN_DIR="$(cygpath -w "$(pwd)/target/${{ matrix.target }}/release")"
          iscc //DVersion="${VERSION}" //DBinDir="${BIN_DIR}" scripts/installer.iss
          mv "scripts/agentline-tray-${VERSION}-win-x64-setup.exe" dist/

      - uses: actions/upload-artifact@v5
        with:
          name: agentline-${{ matrix.label }}
          path: dist/*

  sign-macos:
    name: sign + notarize (${{ matrix.label }})
    needs: build
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: mac-x64
          - label: mac-arm64
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: agentline-${{ matrix.label }}
          path: dist

      - name: import certificate
        env:
          CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN="build.keychain"
          KEYCHAIN_PASSWORD="actions"
          echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import certificate.p12 -k "$KEYCHAIN" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          rm certificate.p12

      - name: sign CLI binary
        env:
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          BINARY=$(ls dist/agentline-*-${{ matrix.label }})
          chmod +x "$BINARY"
          codesign --force --options runtime --sign "$SIGNING_IDENTITY" --timestamp "$BINARY"
          codesign --verify --verbose "$BINARY"

      - name: sign and notarize .app
        env:
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG=$(ls dist/agentline-tray-*.dmg)
          DMG_NAME=$(basename "$DMG")
          MOUNT_DIR=$(mktemp -d)
          WORK_DIR=$(mktemp -d)

          # extract .app from read-only DMG
          hdiutil attach "$DMG" -mountpoint "$MOUNT_DIR" -nobrowse
          cp -R "$MOUNT_DIR/AgentlineTray.app" "$WORK_DIR/"
          hdiutil detach "$MOUNT_DIR"

          # sign both binaries individually, then the .app bundle
          APP_PATH="$WORK_DIR/AgentlineTray.app"
          codesign --force --options runtime --sign "$SIGNING_IDENTITY" --timestamp "$APP_PATH/Contents/MacOS/agentline"
          codesign --force --options runtime --sign "$SIGNING_IDENTITY" --timestamp "$APP_PATH/Contents/MacOS/agentline-tray"
          codesign --force --options runtime --sign "$SIGNING_IDENTITY" --timestamp "$APP_PATH"
          codesign --verify --verbose "$APP_PATH"

          # rebuild DMG with signed .app
          STAGING=$(mktemp -d)
          mv "$APP_PATH" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          rm -f "$DMG"
          hdiutil create -volname "Agentline" -srcfolder "$STAGING" -ov -format UDZO "$DMG"
          rm -rf "$STAGING" "$WORK_DIR"

          # notarize
          SUBMIT_OUT=$(xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1) || true
          echo "$SUBMIT_OUT"
          SUB_ID=$(echo "$SUBMIT_OUT" | grep "id:" | head -1 | awk '{print $2}')
          STATUS=$(echo "$SUBMIT_OUT" | grep "status:" | tail -1 | awk '{print $2}')
          if [ "$STATUS" != "Accepted" ]; then
            echo "--- Notarization log ---"
            xcrun notarytool log "$SUB_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" || true
            exit 1
          fi
          xcrun stapler staple "$DMG"

      - uses: actions/upload-artifact@v5
        with:
          name: agentline-${{ matrix.label }}
          path: dist/*
          overwrite: true

  release:
    needs: [build, sign-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
