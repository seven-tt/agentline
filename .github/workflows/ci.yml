name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # tray crate excluded on Linux — muda/tray-icon have no Linux platform impl
      - run: cargo clippy --workspace --all-targets --exclude agentline-tray -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build & test (Linux, exclude tray)
        if: runner.os == 'Linux'
        run: |
          cargo build --workspace --all-targets --exclude agentline-tray
          cargo test --workspace --exclude agentline-tray
      - name: build & test
        if: runner.os != 'Linux'
        run: |
          cargo build --workspace --all-targets
          cargo test --workspace
